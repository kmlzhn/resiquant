openapi: 3.1.0
info:
  title: ResiQuant Submission Extractor
  version: 1.0.0
  description: Extracts broker & property data from insurance submission emails and attachments.

servers:
  - url: http://localhost:8000

paths:
  /extract:
    post:
      summary: Extract broker & property data
      description: Upload email and attachment files. Returns structured JSON with broker info and property addresses.
      operationId: extract
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
              required: [files]
      responses:
        "200":
          description: Extraction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionResult"
              example:
                request_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                cache_hit: false
                broker_name:
                  value: "Emily Gooding"
                  confidence: 0.97
                  provenance:
                    doc_name: "Resiquant Mail - FW_ Town Squire.pdf"
                    page: 1
                    snippet: "Emily Gooding | Associate Broker, Property"
                broker_email:
                  value: "egooding@brcins.com"
                  confidence: 0.99
                  provenance:
                    doc_name: "Resiquant Mail - FW_ Town Squire.pdf"
                    page: 1
                    snippet: "egooding@brcins.com"
                brokerage:
                  value: "Brown & Riding"
                  confidence: 0.97
                  provenance:
                    doc_name: "Resiquant Mail - FW_ Town Squire.pdf"
                    page: 1
                    snippet: "Brown & Riding | 600 University Street"
                complete_brokerage_address:
                  value: "600 University Street, Suite 3000, Seattle, WA 98101"
                  confidence: 0.95
                  provenance:
                    doc_name: "Resiquant Mail - FW_ Town Squire.pdf"
                    page: 1
                    snippet: "600 University Street, Suite 3000, Seattle, WA 98101"
                property_addresses:
                  - address: "7924 212th St SW, Edmonds, WA 98026"
                    confidence: 0.95
                    provenance:
                      doc_name: "24-25 DIC SOV.xlsx"
                      page: null
                      snippet: "7924 212th St SW  Edmonds  WA  98026"
                latency_ms: 4823.4
                token_usage:
                  prompt_tokens: 14200
                  completion_tokens: 480
                  total_tokens: 14680
                  estimated_cost_usd: 0.0499
                errors: []
        "400":
          description: No files uploaded or all files empty
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
              example:
                detail: "No files uploaded."
        "500":
          description: Internal server error

  /batch-extract:
    post:
      summary: Extract from multiple submissions at once
      description: |
        Two modes:
        - **ZIP mode**: upload one .zip per submission. Each ZIP contains the email PDF + attachments.
        - **Multi-group mode**: upload all files flat; the service auto-detects email files and groups attachments with them.
        Returns a list of extraction results, one per submission.
      operationId: batchExtract
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
              required: [files]
      responses:
        "200":
          description: Batch extraction results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchExtractionResult"
        "400":
          description: No files uploaded or no email files detected

  /metrics:
    get:
      summary: Cost & latency metrics
      description: |
        Returns aggregate token usage, cost, latency, cache, and error stats.
        - API clients receive JSON.
        - Browsers (Accept: text/html) receive an HTML dashboard.
      operationId: getMetrics
      responses:
        "200":
          description: Aggregate metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsResponse"
              example:
                total_requests: 42
                cache_hits: 18
                cache_misses: 24
                cache_hit_rate: 0.4286
                total_tokens_used: 187400
                total_prompt_tokens: 183200
                total_completion_tokens: 4200
                total_cost_usd: 1.612800
                avg_cost_per_request_usd: 0.067200
                total_latency_ms: 198420.5
                avg_latency_ms: 4724.3
                errors_by_type:
                  validation_error: 2
                error_rate: 0.0476

  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

components:
  schemas:
    Provenance:
      type: object
      properties:
        doc_name:
          type: string
        page:
          type: integer
          nullable: true
        snippet:
          type: string

    FieldResult:
      type: object
      properties:
        value:
          type: string
          nullable: true
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
        provenance:
          $ref: "#/components/schemas/Provenance"
          nullable: true

    PropertyAddress:
      type: object
      properties:
        address:
          type: string
        confidence:
          type: number
          format: float
        provenance:
          $ref: "#/components/schemas/Provenance"
          nullable: true

    TokenUsage:
      type: object
      properties:
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer
        estimated_cost_usd:
          type: number
          nullable: true

    ExtractionResult:
      type: object
      properties:
        request_id:
          type: string
        cache_hit:
          type: boolean
        broker_name:
          $ref: "#/components/schemas/FieldResult"
        broker_email:
          $ref: "#/components/schemas/FieldResult"
        brokerage:
          $ref: "#/components/schemas/FieldResult"
        complete_brokerage_address:
          $ref: "#/components/schemas/FieldResult"
        property_addresses:
          type: array
          items:
            $ref: "#/components/schemas/PropertyAddress"
        latency_ms:
          type: number
        token_usage:
          $ref: "#/components/schemas/TokenUsage"
          nullable: true
        errors:
          type: array
          items:
            type: string

    SubmissionResult:
      type: object
      properties:
        submission_id:
          type: string
        result:
          $ref: "#/components/schemas/ExtractionResult"

    BatchExtractionResult:
      type: object
      properties:
        submissions:
          type: array
          items:
            $ref: "#/components/schemas/SubmissionResult"
        total:
          type: integer

    MetricsResponse:
      type: object
      properties:
        total_requests:
          type: integer
          description: Total extraction requests received (cache hits + misses)
        cache_hits:
          type: integer
        cache_misses:
          type: integer
        cache_hit_rate:
          type: number
          format: float
          description: Fraction of requests served from cache (0.0–1.0)
        total_tokens_used:
          type: integer
        total_prompt_tokens:
          type: integer
        total_completion_tokens:
          type: integer
        total_cost_usd:
          type: number
          format: float
          description: Estimated cumulative LLM cost in USD (Perplexity sonar-pro pricing)
        avg_cost_per_request_usd:
          type: number
          format: float
          description: Average cost per LLM call (cache hits excluded)
        total_latency_ms:
          type: number
        avg_latency_ms:
          type: number
          description: Rolling average end-to-end latency in milliseconds
        errors_by_type:
          type: object
          additionalProperties:
            type: integer
          description: Error counts keyed by taxonomy (validation_error, provider_error, timeout)
        error_rate:
          type: number
          format: float
          description: Fraction of requests that had at least one error
